services:
  db:
    image: postgres:16
    container_name: library_db_lab3
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: library_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_lab3:/var/lib/postgresql/data

  api:
    build: .
    container_name: library_api_lab3
    depends_on:
      - db
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/library_db

volumes:
  postgres_data_lab3:
