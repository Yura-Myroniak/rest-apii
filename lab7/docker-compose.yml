services:
  db:
    image: postgres:16
    container_name: library_db_lab7
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: library_db
    ports:
      - "5434:5432"
    volumes:
      - postgres_data_lab7:/var/lib/postgresql/data

  redis:
    image: redis:latest
    container_name: book-cache-lab7
    ports:
      - "6379:6379"

  api:
    build: .
    container_name: library_api_lab7
    depends_on:
      - db
      - redis
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/library_db

volumes:
  postgres_data_lab7:
