services:
  db:
    image: postgres:16
    container_name: library_db_lab9
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: library_db
    ports:
      - "5435:5432"
    volumes:
      - postgres_data_lab9:/var/lib/postgresql/data

  api:
    build: .
    container_name: library_api_lab9
    depends_on:
      - db
    ports:
      - "8009:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/library_db

  locust:
    build: .
    container_name: library_locust_lab9
    depends_on:
      - api
    ports:
      - "8089:8089"
    command: locust -f locustfile.py --host=http://api:8000

volumes:
  postgres_data_lab9:
