services:
  db:
    image: postgres:16
    container_name: library_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: library_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    container_name: library_api
    depends_on:
      - db
    ports:
      - "8000:8000"

volumes:
  postgres_data:
